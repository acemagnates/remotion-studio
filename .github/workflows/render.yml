name: Render Video
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  render:
    name: Render Remotion Clips
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Install OS Dependencies
        run: sudo apt-get update && sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 libpango-1.0-0 libcairo2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2
        
      - name: Ensure Browser
        run: npx remotion browser ensure
        
      - name: Create Output Directory
        run: mkdir -p test-clips
        
      - name: Render Clip-02 ($40M Slam)
        run: npx remotion render src/index.ts clip-02-MG-40m-slam test-clips/clip-02-40m-slam.mp4 --gl=angle
        
      - name: Render Clip-04 (Client Terminated)
        run: npx remotion render src/index.ts clip-04-MG-client-terminated test-clips/clip-04-client-terminated.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle
        
      - name: Render Clip-06 (Timestamp)
        run: npx remotion render src/index.ts clip-06-MG-time-stamp test-clips/clip-06-time-stamp.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle
        
      - name: Render Clip-07 (Margin Crush)
        run: npx remotion render src/index.ts clip-07-MG-margin-crush test-clips/clip-07-margin-crush.mp4 --gl=angle
        
      - name: Render Clip-11 (Profits Chart)
        run: npx remotion render src/index.ts clip-11-MG-profits-chart test-clips/clip-11-profits-chart.mp4 --gl=angle
        
      - name: Render Clip-15 (Bankrupt Vibrate)
        run: npx remotion render src/index.ts clip-15-MG-bankrupt-vibrate test-clips/clip-15-bankrupt-vibrate.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle
        
      - name: Render Clip-17 (Kintsugi Reveal)
        run: npx remotion render src/index.ts clip-17-MG-kintsugi-reveal test-clips/clip-17-kintsugi-reveal.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle
        
      - name: Render Clip-23 (Zero Resistance)
        run: npx remotion render src/index.ts clip-23-MG-zero-resistance test-clips/clip-23-zero-resistance.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle
        
      - name: Render Clip-24 (Lose Edge)
        run: npx remotion render src/index.ts clip-24-MG-lose-edge test-clips/clip-24-lose-edge.mp4 --gl=angle
        
      - name: Upload Clips Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ace-magnates-clips
          path: test-clips/
          retention-days: 5

