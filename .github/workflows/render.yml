name: Render Video
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  render:
    name: Render Remotion Clips
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Install OS Dependencies
        run: sudo apt-get update && sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 libpango-1.0-0 libcairo2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2
        
      - name: Ensure Browser
        run: npx remotion browser ensure
        
      - name: Create Output Directory
        run: mkdir -p test-clips
        
      - name: Render Smartest Building
        run: npx remotion render src/index.ts SmartestBuilding test-clips/smartest-building.mp4 --gl=angle
        
      - name: Render Clip-01 (Burning Phone)
        run: npx remotion render src/index.ts Clip-01-MG test-clips/clip-01.mp4 --gl=angle
        
      - name: Render Clip-02 (Classified Terminal)
        run: npx remotion render src/index.ts Clip-02-MG test-clips/clip-02.mp4 --gl=angle
        
      - name: Render Clip-04 (Reality Overlay)
        run: npx remotion render src/index.ts Clip-04-MG test-clips/clip-04.mp4 --gl=angle
        
      - name: Render Clip-05 (View Counter Streak)
        run: npx remotion render src/index.ts Clip-05-MG test-clips/clip-05.mp4 --gl=angle
        
      - name: Render Clip-06 (Glitch Scoreboard)
        run: npx remotion render src/index.ts Clip-06-MG test-clips/clip-06.mp4 --gl=angle
        
      - name: Render Clip-09 (Laptop UI Counter)
        run: npx remotion render src/index.ts Clip-09-MG test-clips/clip-09.mp4 --gl=angle
        
      - name: Render Clip-11 (Icon Sequence)
        run: npx remotion render src/index.ts Clip-11-MG test-clips/clip-11.mp4 --gl=angle
        
      - name: Render Clip-13 (Eye Vault Morph)
        run: npx remotion render src/index.ts Clip-13-MG test-clips/clip-13.mp4 --gl=angle
        
      - name: Render Clip-14 (Atmospheric Particles)
        run: npx remotion render src/index.ts Clip-14-MG test-clips/clip-14.mp4 --gl=angle
        
      - name: Render Clip-15 (Paid In Full Stamp)
        run: npx remotion render src/index.ts Clip-15-MG test-clips/clip-15.mp4 --gl=angle
        
      - name: Render Clip-16 (Audience Customer)
        run: npx remotion render src/index.ts Clip-16-MG test-clips/clip-16.mp4 --gl=angle
        
      - name: Upload Clips Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ace-magnates-clips
          path: test-clips/
          retention-days: 5
