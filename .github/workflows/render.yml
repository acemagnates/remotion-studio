name: Render Video
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  render:
    name: Render Remotion Video
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Remotion OS Dependencies
        run: npx remotion setup
        
      - name: Render Video
        run: npx remotion render AgeOfAgenticCoding out/video.mp4 --gl=angle
        
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ace-magnates-render
          path: out/video.mp4
          retention-days: 1
