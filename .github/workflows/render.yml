name: Render Video
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  render:
    name: Render Remotion Clips
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Install OS Dependencies
        run: sudo apt-get update && sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 libpango-1.0-0 libcairo2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2
        
      - name: Ensure Browser
        run: npx remotion browser ensure
        
      - name: Create Output Directory
        run: mkdir -p test-clips
        
      - name: Render Clip-01-MG (Taco Stand)
        run: npx remotion render src/index.ts clip-01-MG-taco-stand test-clips/clip-01-MG.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle
        
      - name: Render Clip-03-MG (Data Split)
        run: npx remotion render src/index.ts clip-03-MG-data-split test-clips/clip-03-MG.mp4 --gl=angle
        
      - name: Render Clip-05-MG (Location Stamp)
        run: npx remotion render src/index.ts clip-05-MG-location-stamp test-clips/clip-05-MG.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle
        
      - name: Render Clip-07-MG (Four Lines)
        run: npx remotion render src/index.ts clip-07-MG-four-lines test-clips/clip-07-MG.mp4 --gl=angle
        
      - name: Render Clip-11-MG (Thats It)
        run: npx remotion render src/index.ts clip-11-MG-thats-it test-clips/clip-11-MG.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle
        
      - name: Render Clip-13-MG (Flash Montage)
        run: npx remotion render src/index.ts clip-13-MG-flash-montage test-clips/clip-13-MG.mp4 --gl=angle
        
      - name: Render Clip-17-MG (Add More Strike)
        run: npx remotion render src/index.ts clip-17-MG-add-more-strike test-clips/clip-17-MG.mp4 --gl=angle
        
      - name: Render Clip-19-MG (Gold Leak)
        run: npx remotion render src/index.ts clip-19-MG-gold-leak test-clips/clip-19-MG.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle
        
      - name: Render Clip-20-MG (Gold Dust)
        run: npx remotion render src/index.ts clip-20-MG-gold-dust test-clips/clip-20-MG.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle
        
      - name: Render Clip-21-MG (Not Everything)
        run: npx remotion render src/index.ts clip-21-MG-not-everything test-clips/clip-21-MG.mp4 --gl=angle
        
      - name: Render Clip-23-MG (Stand In Line)
        run: npx remotion render src/index.ts clip-23-MG-stand-in-line test-clips/clip-23-MG.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le --gl=angle

        
      - name: Upload Clips Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ace-magnates-clips
          path: test-clips/
          retention-days: 5

