name: Render Video
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  render:
    name: Render Remotion Video
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install OS Dependencies
        run: sudo apt-get update && sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 libpango-1.0-0 libcairo2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2
        
      - name: Ensure Browser
        run: npx remotion browser ensure
        
      - name: Create Output Directory
        run: mkdir -p out
        
      - name: Render Roman Empire Video
        run: npx remotion render src/index.ts RomanEmpireScene out/roman_empire.mp4 --gl=angle
        
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: roman-empire-render
          path: out/roman_empire.mp4
          retention-days: 1
