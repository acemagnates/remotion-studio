name: Render Video
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  render:
    name: Render Remotion Clips
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Install OS Dependencies
        run: sudo apt-get update && sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 libpango-1.0-0 libcairo2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2
        
      - name: Ensure Browser
        run: npx remotion browser ensure
        
      - name: Create Output Directory
        run: mkdir -p renders/recipe-batch
        
      - name: Render Solid Clips
        run: |
          for id in clip-01-MG clip-03-MG clip-05-MG clip-06-MG clip-07-MG clip-08-MG clip-09-MG clip-13-MG; do
            echo "Rendering $id..."
            npx remotion render src/index.ts $id renders/recipe-batch/$id.webm --image-format=png --codec=vp9 --pixel-format=yuv420p
          done

      - name: Render Transparent Clips
        run: |
          for id in clip-02-MG clip-04-MG clip-10-MG clip-11-MG clip-12-MG; do
            echo "Rendering transparent $id..."
            npx remotion render src/index.ts $id renders/recipe-batch/$id.webm --image-format=png --codec=vp9 --pixel-format=yuva420p
          done

      - name: Upload Clips Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ace-magnates-recipe-batch
          path: renders/recipe-batch/
          retention-days: 5
