name: Render Video
on:
  workflow_dispatch:
    inputs:
      sceneId:
        description: 'The Composition ID to render'
        required: true
        default: 'MainScene'
      transparent:
        description: 'Whether to render with transparency (ProRes 4444)'
        required: true
        type: boolean
        default: false

jobs:
  render:
    name: Render Remotion Clip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Install OS Dependencies
        run: sudo apt-get update && sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libgbm1 libpango-1.0-0 libcairo2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2
        
      - name: Ensure Browser
        run: npx remotion browser ensure
        
      - name: Create Output Directory
        run: mkdir -p renders/
        
      - name: Render Solid Clip (MP4)
        if: github.event.inputs.transparent == 'false'
        run: npx remotion render src/index.ts ${{ github.event.inputs.sceneId }} renders/${{ github.event.inputs.sceneId }}.mp4 --codec=h264

      - name: Render Transparent Clip (ProRes)
        if: github.event.inputs.transparent == 'true'
        run: |
          npx remotion render src/index.ts ${{ github.event.inputs.sceneId }} renders/${{ github.event.inputs.sceneId }}.mov --image-format=png --codec=prores --prores-profile=4444 --pixel-format=yuva444p10le

      - name: Upload Clips Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ace-magnates-renders
          path: renders/
          retention-days: 5
