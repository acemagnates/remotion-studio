name: Render Video
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      composition:
        description: 'Composition ID to render'
        required: true
        default: 'AgeOfAgenticCoding'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Remotion Browser
        run: npx remotion browser ensure

      - name: Debug Info
        run: |
          npx remotion -v
          ls -R src

      - name: Render Video
        run: |
          mkdir -p out
          npx remotion render src/index.ts ${{ github.event.inputs.composition || 'AgeOfAgenticCoding' }} out/video.mp4 --overwrite

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video
          path: out/video.mp4
